meters:
- name: active_photos
  description: Active photos stored across a studio's brands, the primary metric that determines subscription tier.
  unit: photos
  aggregation: max
  dimensions:
  - account
  - brand
- name: storage_bytes
  description: Storage consumed by event/album photos, bundled with the active-photo allowance per plan.
  unit: bytes
  aggregation: max
  dimensions:
  - account
  - brand
- name: order_revenue
  description: Print/product order revenue processed through orders and invoices; ShootProof takes no commission on paid plans.
  unit: currency
  aggregation: sum
  dimensions:
  - account
  - brand
  - order
- name: music_license_usage
  description: Triple Scoop Music tracks licensed via the Music playlist/song-search endpoints, where applicable.
  unit: tracks
  aggregation: count
  dimensions:
  - account
  - playlist
principles:
- name: Visibility
  description: Track active-photo count and storage against the current plan's allowance to anticipate the next tier upgrade or overage.
- name: Allocation
  description: Attribute subscription and lab-fulfillment cost to individual brands/studios when an integration manages multiple ShootProof brands.
- name: Optimization
  description: Archive or delete stale event photos to stay under a lower-cost plan tier; use zip-bundle and digital-rule endpoints to control delivery instead of duplicating storage.
- name: Accountability
  description: Assign a plan owner per studio account and review active-photo usage against the FOCUS active_photos meter monthly.
