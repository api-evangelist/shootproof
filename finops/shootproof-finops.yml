description: >-
  FinOps view of ShootProof spend. The dominant cost is the studio's monthly
  or annual subscription plan, priced on active photo count / storage
  capacity (Free through Unlimited). The Studio API itself carries no
  separate metered fee - it is included with any account once a client ID is
  issued by ShootProof support. Secondary, usage-linked costs flow through the
  platform rather than the API: print/product order fulfillment through
  partner labs (paid by end clients at checkout, with ShootProof taking no
  commission on paid plans), payment processing on invoices/orders, and
  optional Triple Scoop Music licensing accessed via the Music endpoints.
notes: >-
  Per-unit lab fulfillment and payment-processing rates are not reconciled
  here; verify current studio plan pricing at shootproof.com/pricing and lab
  costs inside the Studio Panel. FOCUS columns below model the subscription
  as the primary billed line item.
