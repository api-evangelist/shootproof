aid: shootproof
name: ShootProof
review:
  question: Does ShootProof expose a documented public WebSocket API?
  answer: false
  date: '2026-07-04'
  reviewer: API Evangelist
  asyncapiSpecCreated: false
  asyncapiScopeNote: |
    No AsyncAPI document was authored. ShootProof's public Studio API
    (developer.shootproof.com) is a RESTful, hypermedia (HAL-style `links`)
    API secured with three-legged OAuth 2.0 - pure request/response over
    HTTPS. There is no server-push transport (WebSocket or SSE) documented
    anywhere in the live OpenAPI 3.0 document (oas/studio.json) or the
    developer guide, so there is no async surface on ShootProof's own API to
    model with AsyncAPI.
  findings:
    summary: |
      ShootProof does not publish a documented public WebSocket API. The
      ShootProof Studio API (base https://api.shootproof.com/studio) is a
      RESTful, hypermedia-driven API - every response carries HAL-style
      `links` objects that clients follow to discover further actions -
      authenticated via three-legged OAuth 2.0 (authorization code grant),
      with Bearer access tokens valid for two weeks and long-lived refresh
      tokens. ShootProof publishes a live, downloadable OpenAPI 3.0 document
      at https://developer.shootproof.com/oas/studio.json which, at review
      time, defines 157 paths and 181 schemas across Brands (Studios),
      Contacts (Clients), Contracts, Email, Events (galleries/shoots and
      their Albums and Photos), Invoices, Music (Triple Scoop Music
      integration), Orders (beta), Price Sheets, and account/MFA/notification
      endpoints. All of it is standard REST - GET/POST/PUT/PATCH/DELETE over
      HTTPS, including dedicated batch PATCH/DELETE endpoints for bulk
      operations on events, albums, photos, and price-sheet items/groups.
      Photo delivery uses a redirect-to-signed-URL pattern
      (GET .../photo/{id}/original) and zip-bundle download links rather than
      any push/streaming transport. A separate legacy REST API
      (developer.shootproof.com/legacy/) remains documented for older
      integrations, also plain REST. No ws:// or wss:// endpoint, Server-Sent
      Events stream, or webhook subscription mechanism is documented on
      either the current Studio API or the legacy API as of the review date.
    openSource: |
      The Studio API itself is closed-source/hosted (SaaS), but ShootProof
      publishes client tooling on GitHub (github.com/ShootProof), including a
      PHP SDK (ShootProof/php-sdk) and a command-line client
      (ShootProof/shootproof-cli) that wrap the REST API. API access is
      included free with any ShootProof account; developers obtain a client
      ID by contacting ShootProof support with their application's redirect
      URLs and branding assets.
    transports:
      - protocol: REST
        scheme: https
        baseURL: https://api.shootproof.com/studio
        documented: true
        note: Studio API. RESTful, hypermedia (HAL-style links), OAuth 2.0 Bearer auth. Live OpenAPI 3.0 doc at /oas/studio.json.
      - protocol: REST
        scheme: https
        documented: true
        note: Separate Legacy API still documented at developer.shootproof.com/legacy/ for older integrations.
      - protocol: Redirect / Signed URL
        scheme: https
        documented: true
        note: GET .../photo/{eventPhotoId}/original issues a 302 redirect to a temporary signed URL for the original file; zip-bundle endpoints return download links the same way.
      - protocol: WebSocket
        scheme: wss
        documented: false
        note: No WebSocket endpoint is documented anywhere in the Studio API OpenAPI document, the developer guide, or the legacy API docs as of the review date.
      - protocol: Server-Sent Events
        scheme: https
        documented: false
        note: No SSE stream is documented on either API.
