          The 55 endpoints above were verified live from ShootProof's
          published OpenAPI 3.0 document (oas/studio.json, 157 paths total
          across all tags). Request/response schema field names in
          openapi/shootproof-openapi.yml were simplified/modeled for
          catalog readability rather than copied field-for-field from all
          181 real schemas; the endpoint surface (methods and paths) is
          confirmed real, not invented.
  sources:
    - url: https://developer.shootproof.com/
      type: Documentation
      note: ShootProof for Developers portal overview.
    - url: https://developer.shootproof.com/guide/
      type: Documentation
      note: Developer guide - authentication, authorization, batch operations, collections, entities, errors, HTTP methods, hypermedia, link relations, media types.
    - url: https://developer.shootproof.com/guide/authorization/
      type: Documentation
      note: OAuth 2.0 authorization code flow, scopes, 2-week access token lifetime, refresh tokens.
    - url: https://developer.shootproof.com/guide/errors/
      type: Documentation
      note: Error format (RFC 7807 problem+json) and documented status codes 400/409/507; no rate-limit status documented.
    - url: https://developer.shootproof.com/guide/hypermedia/
      type: Documentation
      note: HAL-style links object and link-relation conventions on every response.
    - url: https://developer.shootproof.com/oas/studio.json
      type: OpenAPI
      note: Live OpenAPI 3.0 document - 157 paths, 181 schemas, OAuth2 security scheme with 5 scopes, confirmed no WebSocket/SSE.
    - url: https://developer.shootproof.com/reference/studio/
      type: APIReference
