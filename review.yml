  actions:
    asyncapiPath: null
    apisYmlUpdated: true
    reason: |
      No WebSocket or other server-push protocol surface exists on
      ShootProof's Studio API or legacy API. Both are request/response REST
      over HTTPS with OAuth 2.0 Bearer authentication, hypermedia links for
      navigation, and redirect-to-signed-URL delivery for photo originals and
      zip bundles. No AsyncAPI document was created because there is no
      async transport on ShootProof's own API to model.
